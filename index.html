<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Weather App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <!-- Include Feather Icons for clean UI -->
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body>
    <div class="app-container" id="app-container">
        <header>
            <div class="search-bar">
                <i data-feather="search" class="search-icon"></i>
                <input type="text" id="city-input" placeholder="Search for a city..." autocomplete="off">
            </div>
        </header>

        <main id="weather-content" class="hidden">
            <section class="current-weather highlight-card">
                <div class="weather-header">
                    <h1 id="city-name">--</h1>
                    <p id="current-date">--</p>
                </div>
                
                <div class="weather-main">
                    <div class="temp-section">
                        <span id="current-temp" class="text-giant">--&deg;</span>
                        <div class="condition-wrapper">
                            <i id="current-icon" data-feather="sun" class="weather-icon-large"></i>
                            <span id="current-condition">--</span>
                        </div>
                    </div>
                </div>

                <div class="weather-details grid-container">
                    <div class="detail-card">
                        <i data-feather="wind"></i>
                        <span class="detail-label">Wind</span>
                        <span class="detail-value" id="wind-speed">-- km/h</span>
                    </div>
                    <div class="detail-card">
                        <i data-feather="droplet"></i>
                        <span class="detail-label">Humidity</span>
                        <span class="detail-value" id="humidity">-- %</span>
                    </div>
                    <div class="detail-card">
                        <i data-feather="sun"></i>
                        <span class="detail-label">UV Index</span>
                        <span class="detail-value" id="uv-index">--</span>
                    </div>
                    <div class="detail-card">
                        <i data-feather="thermometer"></i>
                        <span class="detail-label">Feels Like</span>
                        <span class="detail-value" id="feels-like">--&deg;</span>
                    </div>
                </div>
            </section>

            <section class="hourly-forecast highlight-card">
                <h2>Today</h2>
                <div class="hourly-scroller" id="hourly-container">
                    <!-- Hourly items injected via JS -->
                </div>
            </section>

            <section class="daily-forecast highlight-card">
                <h2>7-Day Forecast</h2>
                <div class="daily-list" id="daily-container">
                    <!-- Daily items injected via JS -->
                </div>
            </section>
        </main>

        <div id="loading" class="loading-state hidden">
            <div class="spinner"></div>
            <p>Fetching weather data...</p>
        </div>
        
        <div id="error" class="error-state hidden">
            <i data-feather="alert-circle"></i>
            <p id="error-message">Could not find city.</p>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
